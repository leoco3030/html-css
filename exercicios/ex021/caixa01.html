<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>

        body {
            background-color: lightgray;
        }
        h1 { /* box-level */
            background-color: lightgray;
            height: 300px;
            width: 300px;
            display: inline;
            padding: 10px 20px;
            border: 10px solid darkslategray;
            margin: 10px auto 10px auto;
            outline: 5px dotted salmon;
        }

        h2 {
            background-color: greenyellow;
            height: 200px;
            width: 450px;
            border-radius: 20px;
            margin: auto;
            text-align: center;
            border: 2px solid black;
            padding: 10px;
        }

        h2:hover {
            background-color: red;
        }

        a { /* inline-level */
            display: inline-block;
            border: 10px solid cyan;
            padding: 10px 50px;
        }

        h2 > p {
            display: none;
        }

        h2:hover > p {
            display: block;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 50px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
    
    <h2>
        Exemplo de caixa inline-block
        <p>TEXTO OCULTO</p>
    </h2>
</body>
</html>
